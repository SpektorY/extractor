# Run the whole stack: PostgreSQL + Backend + Frontend
# Usage: docker compose up --build
# Then: App http://localhost:5173  |  API http://localhost:8000  |  Docs http://localhost:8000/docs

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hamachletz
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hamachletz
      SECRET_KEY: ${SECRET_KEY:-change-me-use-openssl-rand-hex-32}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
